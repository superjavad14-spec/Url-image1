name: Extract Image Links

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: "لینک کامل سایت جهت استخراج تصاویر"
        required: true
        type: string

# مجوز نوشتن در مخزن (برای push)
permissions:
  contents: write

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run image extractor
        id: extract
        run: python extract_images.py "${{ github.event.inputs.website_url }}"
        # هر خروجی غیرصفر باعث توقف workflow خواهد شد (set -e به‌صورت پیش‌فرض فعال است)

      - name: Commit and push links.txt (only if changed)
        if: success()   # فقط در صورت موفقیت مرحله قبل
        env:
          COMMIT_MSG: "Update image links for ${{ github.event.inputs.website_url }} on $(date -u +'%Y-%m-%d %H:%M UTC')"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add links.txt

          # اگر فایل تغییری نکرده باشد، commit انجام نمی‌شود
          git diff --staged --quiet || git commit -m "$COMMIT_MSG"

          git push
